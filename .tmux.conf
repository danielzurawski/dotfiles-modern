# ~/.tmux.conf — managed by dotfiles-modern

# Enable mouse: click to select panes/windows, drag borders to resize, drag to select text.
set -g mouse on

# Bigger scrollback buffer.
set -g history-limit 50000

# Mouse wheel scrolls tmux's OWN scrollback instead of being forwarded to the
# focused full-screen app. This stops the wheel from scrolling an app's internal
# history (e.g. Claude Code). Wheel-up opens copy-mode and scrolls back; wheel-down
# scrolls forward while in copy-mode and does nothing at the live prompt.
# Keyboard input still goes straight to the app — only the wheel is intercepted.
bind -n WheelUpPane   if -F '#{pane_in_mode}' 'send -M' 'copy-mode -e'
bind -n WheelDownPane if -F '#{pane_in_mode}' 'send -M' ''

# Copy mouse selections straight to the macOS clipboard via pbcopy.
#
# With mouse mode on, tmux owns the drag selection, so VSCode never sees a
# native selection and ⌘C can't grab it. tmux's default copy path emits the
# clipboard over OSC-52, which VSCode mangles for multi-byte UTF-8 (→, —,
# box-drawing) into mojibake (e.g. "→" becomes "â" + junk). Piping the raw
# selection bytes through pbcopy preserves UTF-8 exactly.
#
# Workflow: drag to select (auto-scrolls past the pane edges, so large blocks
# spanning scrollback work); releasing the mouse button copies the selection to
# the system clipboard. ⌘C afterwards is now unnecessary (but harmless).
#
# Keep set-clipboard ON. The pbcopy binding below already bypasses tmux's OSC-52
# path on copy, so it owns the macOS clipboard no matter what this is set to —
# there is no OSC-52 write to race with. Setting it "off", however, ALSO blocks
# INBOUND OSC-52, which breaks pasting *into* apps running under tmux (e.g.
# Claude Code): pastes arrive empty. So leave it on so paste keeps working.
set -g set-clipboard on
bind -T copy-mode    MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
